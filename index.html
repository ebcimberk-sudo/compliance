<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compliance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg1:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;
  --pink:#ff3da6;--pink2:#ff6dbf;--pink-bg:rgba(255,61,166,.1);--pink-border:rgba(255,61,166,.25);
  --yellow:#f5c518;--yellow2:#ffd84d;--yellow-bg:rgba(245,197,24,.1);--yellow-border:rgba(245,197,24,.25);
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.25);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);
  --rad:12px;--rads:7px;
}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:1280px;margin:0 auto;padding:28px 24px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--border2)}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--pink),var(--yellow));display:flex;align-items:center;justify-content:center;color:#000;font-size:20px;font-weight:700;box-shadow:0 0 24px rgba(255,61,166,.35)}
.htitle{font-size:18px;font-weight:700;letter-spacing:-.02em}
.hsub{font-size:12px;color:var(--text3);margin-top:2px}
.upload-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:var(--rads);border:none;background:linear-gradient(135deg,var(--pink),#c0368a);color:#fff;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .2s;box-shadow:0 0 16px rgba(255,61,166,.3)}
.upload-btn:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(255,61,166,.45)}
#fi{display:none}
.upload-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.upload-overlay.show{display:flex}
.upload-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad);padding:32px;max-width:500px;width:90%;text-align:center}
.upload-modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
.upload-modal p{font-size:13px;color:var(--text2);margin-bottom:24px}
.drop-zone{border:2px dashed var(--pink-border);border-radius:var(--rad);padding:40px 24px;cursor:pointer;transition:all .2s;background:var(--pink-bg);position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--pink);background:rgba(255,61,166,.15)}
.dz-icon{font-size:40px;margin-bottom:12px}
.dz-text{font-size:13px;color:var(--text2)}
.dz-text strong{color:var(--pink)}
.dz-hint{font-size:11px;color:var(--text3);margin-top:6px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-top:18px;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--yellow));border-radius:3px;transition:width .3s;width:0}
.parse-status{font-size:12px;margin-top:10px;display:none;min-height:18px;font-weight:500}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;border-radius:var(--rads);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer}
.btn-cancel:hover{background:var(--bg3)}
.tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rads);padding:4px;width:fit-content;margin-bottom:28px}
.tab{padding:8px 20px;border-radius:5px;border:none;background:transparent;font-size:13px;font-family:inherit;cursor:pointer;color:var(--text3);font-weight:500;transition:all .15s}
.tab.active{background:var(--bg4);color:var(--pink);box-shadow:0 1px 4px rgba(0,0,0,.5)}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rad);padding:20px 22px}
.sl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rad);padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-pink::before{background:linear-gradient(90deg,var(--pink),var(--pink2))}
.kpi-yellow::before{background:linear-gradient(90deg,var(--yellow),var(--yellow2))}
.kpi-green::before{background:linear-gradient(90deg,var(--green),#4ade80)}
.kpi-red::before{background:var(--red)}
.kpi-label{font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:500}
.kpi-value{font-size:32px;font-weight:700;letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
.stat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-label{flex:1;font-size:13px;color:var(--text2)}
.stat-n{font-size:13px;font-weight:600;color:var(--text);min-width:24px;text-align:right}
.stat-p{font-size:12px;color:var(--text3);min-width:38px;text-align:right}
.stat-bar{width:72px;flex-shrink:0}
.bar-track{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.stat-total{display:flex;justify-content:flex-end;padding-top:10px;margin-top:2px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-weight:600}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.b-pink{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-border)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.b-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.iv{color:var(--green);font-size:12px;font-weight:600}
.ie{color:var(--red);font-size:12px;font-weight:600}
.iw{color:var(--amber);font-size:12px;font-weight:600}
.im{color:var(--text3);font-size:12px}
.tw{overflow-x:auto;border-radius:var(--rad);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:11px 14px;font-weight:600;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr.cr{cursor:pointer}
tr.cr:hover td{background:var(--bg2)}
tr.ex td{background:var(--bg2)}
tr.xr td{padding:0}
.xc{padding:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;background:var(--bg2)}
.xn{grid-column:1/-1;padding:12px 14px;background:rgba(245,158,11,.08);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;font-size:12px;color:var(--text2);line-height:1.6}
.xl2{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.xv2{font-size:13px;font-weight:500}
.fl{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
input[type=text],select{font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--rads);background:var(--bg2);color:var(--text);outline:none}
input[type=text]:focus,select:focus{border-color:var(--pink)}
input[type=text]{flex:1;min-width:200px}
input[type=text]::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
.rc{font-size:12px;color:var(--text3)}
.hi{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.hi:last-child{border-bottom:none}
.hi:hover,.hi.act{background:var(--bg2)}
.hico{width:42px;height:42px;border-radius:10px;background:var(--pink-bg);border:1px solid var(--pink-border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hin{flex:1}
.hnm{font-weight:600;font-size:14px}
.hmt{font-size:12px;color:var(--text3);margin-top:2px}
.hbd{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ib{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rads);padding:12px 16px;font-size:12px;color:var(--text3);margin-top:14px;display:flex;gap:8px}
.nm{font-weight:500}.ns{font-size:11px;color:var(--text3);margin-top:1px}.tm{color:var(--text2)}.ts{font-size:12px}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--green-border);color:var(--green);padding:12px 20px;border-radius:var(--rads);font-size:13px;font-weight:500;z-index:200;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:var(--red-border);color:var(--red)}
tr.row-red td:first-child{border-left:3px solid var(--red)}
tr.row-amber td:first-child{border-left:3px solid var(--amber)}
tr.row-green td:first-child{border-left:3px solid rgba(34,197,94,.4)}
.qf-wrap{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.qf{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text3);transition:all .15s}
.qf.active,.qf:hover{border-color:var(--pink);color:var(--pink);background:var(--pink-bg)}
.issue-chip{display:inline-flex;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);margin-right:3px}
.warn-chip{display:inline-flex;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.3);margin-right:3px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">⚡</div>
    <div>
      <div class="htitle">Compliance Dashboard</div>
      <div class="hsub" id="hs">Active contractors &nbsp;·&nbsp; 22 May 2026</div>
    </div>
  </div>
  <button class="upload-btn" onclick="openUpload()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Upload New File
  </button>
</div>

<div class="upload-overlay" id="uploadOverlay" onclick="closeUploadOutside(event)">
  <div class="upload-modal">
    <h3>Upload Compliance File</h3>
    <p>Upload your .xlsm or .xlsx and all stats update instantly.</p>
    <div class="drop-zone" id="dropZone" ondragover="onDrag(event)" ondragleave="offDrag()" ondrop="onDrop(event)">
      <div class="dz-icon">📊</div>
      <div class="dz-text">Drag & drop here or <strong onclick="document.getElementById('fi').click()">click to browse</strong></div>
      <div class="dz-hint">Supports .xlsx and .xlsm</div>
    </div>
    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
    <div class="parse-status" id="parseSt"></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeUpload()">Cancel</button></div>
  </div>
</div>
<input type="file" id="fi" accept=".xlsx,.xlsm,.csv">

<div class="tabs">
  <button class="tab active" onclick="sw('o',this)">Overview</button>
  <button class="tab" onclick="sw('c',this)">Contractors</button>
  <button class="tab" onclick="sw('f',this)">Finishers</button>
  <button class="tab" onclick="sw('h',this)">Upload History</button>
</div>
<div id="to"></div><div id="tc" style="display:none"></div><div id="tf" style="display:none"></div><div id="th" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

// ── KEY FIX: normalised column lookup ─────────────────────────────────────────
// Headers in the Excel have trailing spaces, newlines, special chars.
// We normalise by lowercasing + stripping whitespace for matching.
function makeGetter(row) {
  // Build a normalised key -> original key map
  const norm = {};
  Object.keys(row).forEach(k => { norm[k.toLowerCase().replace(/\s+/g,'')] = k; });
  return function(aliases) {
    for (const alias of aliases) {
      const key = norm[alias.toLowerCase().replace(/\s+/g,'')];
      if (key !== undefined) {
        const v = row[key];
        if (v !== undefined && v !== '' && String(v).trim() !== '#VALUE!') return String(v).trim();
      }
    }
    return '';
  };
}

      const hs = computeHelperStats(parsed.length > 0 ? parsed : LIVE);

      if (parsed.length > 0) { LIVE = parsed; LIVE_HS = hs; }
      if (parsedFin.length > 0) LIVE_FIN = parsedFin;

      const ds = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      const nu = {id:Date.now(), name:file.name, date:ds,
        count:LIVE.length, compliant:LIVE.filter(r=>r.ok==='Compliant').length,
        nonCompliant:LIVE.filter(r=>r.ok==='Non-Compliant').length, hs:LIVE_HS, fin:LIVE_FIN};
      UH = [nu, ...UH]; AU = nu.id;
      document.getElementById('hs').textContent = 'Active contractors · ' + ds;

      setStatus(100, `✓ ${LIVE.length} contractors, ${LIVE_FIN.length} finishers loaded`);
      setTimeout(() => { closeUpload(); rt(); showToast(`✓ ${file.name} loaded`); }, 800);

    } catch(err) {
      console.error('Parse error:', err);
      setStatus(0, '✗ Error: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── render helpers ────────────────────────────────────────────────────────────
const CMAP={'Valid':'#22c55e','Due in 60 Days':'#f59e0b','Due in 30 Days':'#fbbf24','Due/Expired':'#ef4444','Expired':'#ef4444','Missing':'#6b7280','N/A':'#4b5563','Yes':'#22c55e','No':'#ef4444','Margin only':'#6b7280','Inside':'#ff3da6','Outside':'#f5c518','N/A (Margin only, MO, Deel, Umbrella, Workwell)':'#6b7280'};
function statCard(title,rows,foot){
  return`<div class="card"><div class="sl">${title}</div>
    ${rows.map(r=>{const c=CMAP[r.l]||'#6366f1';return`<div class="stat-row"><div class="stat-dot" style="background:${c}"></div><span class="stat-label">${r.l}</span><span class="stat-n">${r.n}</span><span class="stat-p">${r.p}%</span><div class="stat-bar"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(r.p,100)}%;background:${c}"></div></div></div></div>`;}).join('')}
    <div class="stat-total">Total: ${foot}</div></div>`;}
function ct(r){const cd=(r.cd||'').toLowerCase(),u=(r.umb||'').toLowerCase(),l=(r.ltd||'').toLowerCase();
  if(cd.includes('margin only'))return'Margin Only';if(u.includes('deel')||cd.includes('deel'))return'Deel';
  if(u.includes('workwell')||cd.includes('workwell'))return'Workwell';if(u&&u!=='no'&&u.length>3)return'Umbrella';
  if(l&&l!=='no'&&l.length>3)return'LTD';return'Other';}
function ic(w){if(!w||['margin only','deel','workwell','not applicable'].some(x=>w.toLowerCase().includes(x)))return'im';
  const wl=w.toLowerCase();if(wl==='valid')return'iv';if(wl.includes('expired'))return'ie';
  if(wl.includes('30')||wl.includes('60'))return'iw';if(wl.includes('none')||wl.includes('missing'))return'ie';return'im';}
function il(w){if(!w||['margin only','deel','workwell','not applicable'].some(x=>w.toLowerCase().includes(x)))return'—';
  const wl=w.toLowerCase();if(wl==='valid')return'✓ Valid';if(wl.includes('expired'))return'✗ Expired';
  if(wl.includes('30')||wl.includes('60'))return'⚠ '+w;if(wl.includes('none')||wl.includes('missing'))return'✗ Missing';return w;}
function ih(w){return`<span class="${ic(w)}">${il(w)}</span>`;}
function bh(s){const sl=(s||'').toLowerCase();
  if(sl.includes('compliant')&&!sl.includes('non'))return'<span class="badge b-green">✓ Compliant</span>';
  if(sl.includes('non'))return'<span class="badge b-red">✗ Non-Compliant</span>';
  if(sl.includes('finish'))return'<span class="badge b-yellow">Finisher</span>';
  return`<span class="badge b-gray">${s||'—'}</span>`;}
function finIssues(r){
  const chips=[];
  ({eli:'ELI',pii:'PII',pli:'PLI'});
  [['eli','ELI'],['pii','PII'],['pli','PLI']].forEach(([f,label])=>{
    const w=(r[f]||'').toLowerCase();
    if(w.includes('expired')||w.includes('none')||w.includes('missing'))chips.push(`<span class="issue-chip">✗ ${label}</span>`);
    else if(w.includes('30')||w.includes('60'))chips.push(`<span class="warn-chip">⚠ ${label}</span>`);
  });
  if((r.rtw||'').toLowerCase().includes('expired')||(r.rtw||'').toLowerCase().includes('missing'))chips.push('<span class="issue-chip">✗ RTW</span>');
  return chips.join('')||'<span style="font-size:11px;color:var(--text3)">—</span>';}
function finUrgency(r){
  const issues=['eli','pii','pli','rtw'].some(f=>{const w=(r[f]||'').toLowerCase();return w.includes('expired')||w.includes('missing')||w.includes('none');});
  const warns=['eli','pii','pli'].some(f=>{const w=(r[f]||'').toLowerCase();return w.includes('30')||w.includes('60');});
  if((r.ok||'').toLowerCase().includes('non')||issues)return'row-red';
  if(warns)return'row-amber';return'row-green';}

function sw(name,btn){AT=name;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');rt();}
function rt(){['o','c','f','h'].forEach(t=>{document.getElementById('t'+t).style.display=AT===t?'block':'none';});
