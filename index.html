<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compliance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg1:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;
  --pink:#ff3da6;--pink2:#ff6dbf;--pink-bg:rgba(255,61,166,.1);--pink-border:rgba(255,61,166,.25);
  --yellow:#f5c518;--yellow2:#ffd84d;--yellow-bg:rgba(245,197,24,.1);--yellow-border:rgba(245,197,24,.25);
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.25);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);--amber-border:rgba(245,158,11,.3);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--blue-border:rgba(59,130,246,.25);
  --rad:12px;--rads:7px;
}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.pw-gate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.pw-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad);padding:40px;width:380px;text-align:center}
.pw-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--yellow));display:flex;align-items:center;justify-content:center;color:#000;font-size:24px;font-weight:700;margin:0 auto 20px;box-shadow:0 0 28px rgba(255,61,166,.4)}
.pw-title{font-size:20px;font-weight:700;margin-bottom:6px}
.pw-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.pw-input{width:100%;padding:12px 16px;border:1px solid var(--border2);border-radius:var(--rads);background:var(--bg3);color:var(--text);font-size:15px;font-family:inherit;text-align:center;letter-spacing:2px;outline:none;transition:border .2s;margin-bottom:12px}
.pw-input:focus{border-color:var(--pink)}
.pw-input.err{border-color:var(--red);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pw-btn{width:100%;padding:12px;border:none;border-radius:var(--rads);background:linear-gradient(135deg,var(--pink),#c0368a);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.pw-btn:hover{opacity:.88}
.pw-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
.app{max-width:1320px;margin:0 auto;padding:28px 24px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--border2)}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--pink),var(--yellow));display:flex;align-items:center;justify-content:center;color:#000;font-size:20px;font-weight:700;box-shadow:0 0 24px rgba(255,61,166,.35)}
.htitle{font-size:18px;font-weight:700;letter-spacing:-.02em}
.hsub{font-size:12px;color:var(--text3);margin-top:2px}
.hdr-r{display:flex;gap:10px;align-items:center}
.upload-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:var(--rads);border:none;background:linear-gradient(135deg,var(--pink),#c0368a);color:#fff;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .2s;box-shadow:0 0 16px rgba(255,61,166,.3)}
.upload-btn:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(255,61,166,.45)}
#fi{display:none}
.upload-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.upload-overlay.show{display:flex}
.upload-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad);padding:32px;max-width:500px;width:90%;text-align:center}
.upload-modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
.upload-modal p{font-size:13px;color:var(--text2);margin-bottom:24px}
.drop-zone{border:2px dashed var(--pink-border);border-radius:var(--rad);padding:40px 24px;cursor:pointer;transition:all .2s;background:var(--pink-bg)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--pink);background:rgba(255,61,166,.15)}
.dz-icon{font-size:40px;margin-bottom:12px}
.dz-text{font-size:13px;color:var(--text2)}
.dz-text strong{color:var(--pink)}
.dz-hint{font-size:11px;color:var(--text3);margin-top:6px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-top:18px;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--yellow));border-radius:3px;transition:width .3s;width:0}
.parse-status{font-size:12px;margin-top:10px;display:none;min-height:18px;font-weight:500}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;border-radius:var(--rads);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer}
.btn-cancel:hover{background:var(--bg3)}
.tabs{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rads);padding:4px;width:fit-content;margin-bottom:28px}
.tab{padding:8px 20px;border-radius:5px;border:none;background:transparent;font-size:13px;font-family:inherit;cursor:pointer;color:var(--text3);font-weight:500;transition:all .15s}
.tab.active{background:var(--bg4);color:var(--pink);box-shadow:0 1px 4px rgba(0,0,0,.5)}
.tab.warn-tab.active{color:var(--red)}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rad);padding:20px 22px}
.sl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rad);padding:18px 20px;position:relative;overflow:hidden;cursor:default}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-pink::before{background:linear-gradient(90deg,var(--pink),var(--pink2))}
.kpi-yellow::before{background:linear-gradient(90deg,var(--yellow),var(--yellow2))}
.kpi-green::before{background:linear-gradient(90deg,var(--green),#4ade80)}
.kpi-red::before{background:var(--red)}
.kpi-amber::before{background:var(--amber)}
.kpi-blue::before{background:var(--blue)}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:36px;font-weight:700;letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
.stat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-label{flex:1;font-size:13px;color:var(--text2)}
.stat-n{font-size:13px;font-weight:600;color:var(--text);min-width:24px;text-align:right}
.stat-p{font-size:12px;color:var(--text3);min-width:38px;text-align:right}
.stat-bar{width:72px;flex-shrink:0}
.bar-track{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.stat-total{display:flex;justify-content:flex-end;padding-top:10px;margin-top:2px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-weight:600}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.b-pink{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-border)}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.b-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin:2px;white-space:nowrap}
.chip-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.chip-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.chip-missing{background:rgba(100,100,100,.15);color:#888;border:1px solid #444}
.tw{overflow-x:auto;border-radius:var(--rad);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:11px 14px;font-weight:600;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr.cr{cursor:pointer}
tr.cr:hover td{background:rgba(255,255,255,.02)}
tr.sev-red td:first-child{border-left:3px solid var(--red)}
tr.sev-amber td:first-child{border-left:3px solid var(--amber)}
tr.sev-green td:first-child{border-left:3px solid rgba(34,197,94,.3)}
tr.ex td{background:rgba(255,61,166,.03)}
tr.xr td{padding:0}
.xc{padding:20px;background:var(--bg2);display:grid;grid-template-columns:repeat(4,1fr);gap:14px;border-top:1px solid var(--border)}
.xn{grid-column:1/-1;padding:12px 14px;background:rgba(245,158,11,.07);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;font-size:12px;color:var(--text2);line-height:1.7}
.xl2{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.xv2{font-size:13px;font-weight:500}
.fl{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
input[type=text],select{font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--rads);background:var(--bg2);color:var(--text);outline:none}
input[type=text]:focus,select:focus{border-color:var(--pink)}
input[type=text]{flex:1;min-width:200px}
input[type=text]::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
.rc{font-size:12px;color:var(--text3)}
.qf-wrap{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.qf{padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text3);font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
.qf:hover{border-color:var(--pink2);color:var(--pink2)}
.qf.active{background:var(--pink-bg);border-color:var(--pink);color:var(--pink)}
.qf.qf-red.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.qf.qf-amber.active{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.qf.qf-blue.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.qf.qf-yellow.active{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow)}
.qf-count{background:rgba(255,255,255,.1);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.hi{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.hi:last-child{border-bottom:none}
.hi:hover,.hi.act{background:var(--bg2)}
.hico{width:42px;height:42px;border-radius:10px;background:var(--pink-bg);border:1px solid var(--pink-border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hin{flex:1}.hnm{font-weight:600;font-size:14px}.hmt{font-size:12px;color:var(--text3);margin-top:2px}
.hbd{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ib{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rads);padding:12px 16px;font-size:12px;color:var(--text3);margin-top:14px;display:flex;gap:8px}
.iv{color:var(--green);font-size:12px;font-weight:600}
.ie{color:var(--red);font-size:12px;font-weight:600}
.iw{color:var(--amber);font-size:12px;font-weight:600}
.im{color:var(--text3);font-size:12px}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--green-border);color:var(--green);padding:12px 20px;border-radius:var(--rads);font-size:13px;font-weight:500;z-index:200;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:var(--red-border);color:var(--red)}
.sdiv{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
@media(max-width:900px){.g4,.g6{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="pw-gate" id="pwGate">
  <div class="pw-box">
    <div class="pw-logo">⚡</div>
    <div class="pw-title">Compliance Dashboard</div>
    <div class="pw-sub">Enter your password to continue</div>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Unlock Dashboard</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>
<div class="app" id="appWrap" style="display:none">
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">⚡</div>
    <div>
      <div class="htitle">Compliance Dashboard</div>
      <div class="hsub" id="hs">Active contractors · <span id="parsedDate"></span></div>
    </div>
  </div>
  <div class="hdr-r">
    <button class="upload-btn" onclick="openUpload()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload New File
    </button>
  </div>
</div>
<div class="upload-overlay" id="uploadOverlay" onclick="closeUploadOutside(event)">
  <div class="upload-modal">
    <h3>Upload Compliance File</h3>
    <p>Upload your .xlsm or .xlsx — all stats update instantly.</p>
    <div class="drop-zone" id="dropZone" ondragover="onDrag(event)" ondragleave="offDrag()" ondrop="onDrop(event)">
      <div class="dz-icon">📊</div>
      <div class="dz-text">Drag & drop here or <strong>click to browse</strong></div>
      <div class="dz-hint">Supports .xlsx and .xlsm</div>
    </div>
    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
    <div class="parse-status" id="parseSt"></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeUpload()">Cancel</button></div>
  </div>
</div>
<input type="file" id="fi" accept=".xlsx,.xlsm,.csv">
<div class="tabs">
  <button class="tab active" onclick="sw('o',this)">Overview</button>
  <button class="tab" onclick="sw('c',this)">Contractors</button>
  <button class="tab warn-tab" onclick="sw('n',this)">⚠ Non-Compliant & Actions</button>
  <button class="tab" onclick="sw('h',this)">Upload History</button>
</div>
<div id="to"></div><div id="tc" style="display:none"></div>
<div id="tn" style="display:none"></div><div id="th" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const PW='Operations2026!';
function checkPw(){const v=document.getElementById('pwInput').value;if(v===PW){sessionStorage.setItem('cdauth','1');document.getElementById('pwGate').style.display='none';document.getElementById('appWrap').style.display='block';init();}else{const inp=document.getElementById('pwInput');inp.classList.add('err');document.getElementById('pwErr').textContent='Incorrect password.';setTimeout(()=>inp.classList.remove('err'),400);inp.value='';}}
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('cdauth')==='1'){document.getElementById('pwGate').style.display='none';document.getElementById('appWrap').style.display='block';init();}
  else document.getElementById('pwInput').focus();
  document.getElementById('dropZone').addEventListener('click',()=>document.getElementById('fi').click());
  document.getElementById('fi').addEventListener('change',e=>{const f=e.target.files[0];if(f)parseFile(f);e.target.value='';});
});

// ── NORMALISED COLUMN GETTER ──────────────────────────────────────────────────
// Strips all whitespace/newlines from header keys before matching
// This handles headers with trailing spaces, newlines, special chars in Excel
function makeGetter(row){
  const norm={};
  Object.keys(row).forEach(k=>{norm[k.toLowerCase().replace(/[\s\n\r]+/g,'')]=k;});
  return function(aliases){
    for(const a of aliases){
      const key=norm[a.toLowerCase().replace(/[\s\n\r]+/g,'')];
      if(key!==undefined){const v=row[key];if(v!==undefined&&v!==''&&String(v).trim()!=='#VALUE!')return String(v).trim();}
    } return '';
  };
}

// ── VALUE MAPPERS ─────────────────────────────────────────────────────────────
function mapWarn(v){
  // Maps Excel "Warning" column values (Valid/Expired/<30 Days/60 Days) to our status codes
  if(!v||!v.trim())return'Missing';
  const sl=v.trim().toLowerCase();
  if(['margin only','n/a','not applicable','no','deel','workwell','umbrella','cor'].some(x=>sl.includes(x)))return'N/A';
  if(sl==='valid')return'Valid';
  if(sl.includes('expired'))return'Expired';
  if(sl.includes('<30')||sl.includes('30 days'))return'<30 Days';
  if(sl.includes('60'))return'60 Days';
  if(sl.includes('none')||sl.includes('missing'))return'Missing';
  return'N/A';
}
function mapRTW(v){
  // Maps "Right to Work Status" column: "X days left", "Expired", N/A variants
  if(!v||!v.trim()||v.trim()==='#VALUE!')return'Missing';
  const sl=v.trim().toLowerCase();
  if(['margin only','n/a','not applicable','deel','workwell','umbrella'].some(x=>sl.includes(x)))return'N/A';
  if(sl==='expired')return'Expired';
  if(sl.includes('days left')){
    const n=parseInt(v);
    if(!isNaN(n)){if(n<0)return'Expired';if(n<=30)return'<30 Days';if(n<=60)return'60 Days';return'Valid';}
  }
  return'Missing';
}
function mapSDS(v){
  // SDS: IR35 REPORT column — Yes/Margin Only/N/A/None on file
  if(!v||!v.trim())return'Missing';
  const sl=v.trim().toLowerCase();
  if(['margin only','n/a','not applicable','umbrella','deel','workwell','cor'].some(x=>sl.includes(x)))return'N/A';
  if(sl==='yes')return'Yes';
  if(sl.includes('none')||sl.includes('missing'))return'Missing';
  return v.trim();
}
function mapHMRC(v){
  // HMRC CEST Tool (Date Created) — date string = Yes (done), None on file = Missing
  if(!v||!v.trim())return'Missing';
  const sl=v.trim().toLowerCase();
  if(['margin only','n/a','not applicable','umbrella','deel','workwell','cor'].some(x=>sl.includes(x)))return'N/A';
  if(sl==='yes')return'Yes';
  if(sl.includes('none')||sl.includes('missing'))return'Missing';
  if(v.includes('-')||v.includes('/'))return'Yes'; // Any date string = completed
  return'Missing';
}
function docVal(v){
  if(!v||!v.trim())return'Missing';
  const sl=v.trim().toLowerCase();
  if(['margin only','n/a','not applicable','umbrella','deel','workwell','cor'].some(x=>sl.includes(x)))return'N/A';
  if(['yes','valid'].includes(sl))return'Yes';
  if(sl.includes('none')||sl.includes('missing'))return'Missing';
  if(sl.startsWith('=if('))return'Missing';
  return v.trim();
}

// ── ISSUE & STAT COMPUTATION ──────────────────────────────────────────────────
function computeIssues(c){
  const issues=[];
  [['eli','ELI'],['pii','PII'],['pli','PLI'],['rtw','RTW']].forEach(([f,l])=>{
    const v=c[f];
    if(v==='Expired')issues.push({label:l,status:'Expired',sev:'red'});
    else if(v==='<30 Days')issues.push({label:l,status:'<30 Days',sev:'red'});
    else if(v==='60 Days')issues.push({label:l,status:'60 Days',sev:'amber'});
    else if(v==='Missing')issues.push({label:l,status:'Missing',sev:'red'});
  });
  [['sc','Signed Contractor Contract'],['scl','Signed Client Contract'],
   ['sds','SDS IR35 Report'],['hmrc','HMRC CEST Tool'],
   ['bank','Proof of Bank Details'],['vat','VAT Certificate'],['coi','Certificate of Incorporation']
  ].forEach(([f,l])=>{if(c[f]==='Missing')issues.push({label:l,status:'Missing',sev:'red'});});
  return issues;
}
function computeStats(data){
  const total=data.length,nc=data.filter(c=>(c.ok||'').toLowerCase().includes('non')).length;
  return{total,nc,compliant:total-nc,
    has_issues:data.filter(c=>c.issues&&c.issues.length>0).length,
    expired:data.filter(c=>c.issues&&c.issues.some(i=>i.status==='Expired')).length,
    missing:data.filter(c=>c.issues&&c.issues.some(i=>i.status==='Missing')).length,
    exp30:data.filter(c=>c.issues&&c.issues.some(i=>i.status==='<30 Days')).length,
    exp60:data.filter(c=>c.issues&&c.issues.some(i=>i.status==='60 Days')).length,
    rtw:data.filter(c=>['Expired','<30 Days','60 Days','Missing'].includes(c.rtw)).length,
    sds_missing:data.filter(c=>c.sds==='Missing').length,
    hmrc_missing:data.filter(c=>c.hmrc==='Missing').length};
}

// ── XLSX PARSER ───────────────────────────────────────────────────────────────
// Uses exact normalised column names from the Compliance_Data_2026.xlsm sheet:
// Col 23: 'SDS: IR35 REPORT'             -> normalised: 'sds:ir35report'
// Col 24: 'HMRC CEST Tool (Date Created)' -> normalised: 'hmrccesttool(datecreated)'
// Col 26: 'Right to Work Status'           -> normalised: 'righttoworkstatus'
// Col 30: 'Employers Liability Insurance Warning' -> normalised: 'employersliabilityinsurancewarning'
// Col 33: 'Professional Indemnity Insurance Warning' -> normalised: 'professionalindemnityinsurancewarning'
// Col 36: 'Public Liability Insurance Warning' -> normalised: 'publicliabilityinsurancewarning'
function parseFile(file){
  setSt(10,'Reading file…');
  const reader=new FileReader();
  reader.onerror=()=>setSt(0,'Could not read file',true);
  reader.onload=function(e){
    try{
      setSt(35,'Parsing workbook…');
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false,raw:false});
      const dsName=wb.SheetNames.find(n=>/^data$/i.test(n.trim()))||wb.SheetNames.find(n=>/data/i.test(n))||wb.SheetNames[0];
      setSt(60,`Reading "${dsName}"…`);
      const ws=wb.Sheets[dsName];
      const dataRows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
      const parsed=dataRows.map(row=>{
        const g=makeGetter(row);
        const c={
          name:g(['contractorname']),
          jt:g(['jobtitle']),
          id:g(['placementid']),
          ltd:g(['ltd']),
          umb:g(['umbrella']),
          cd:g(['clientdetermination']),
          co:g(['clientcompanyname']),
          con:g(['consultant']),
          ps:g(['placementduetostart']),
          pe:g(['placementenddate']),
          sc:docVal(g(['signedcandidatecontractcontractor'])),
          scl:docVal(g(['signedclientcontractcontractor'])),
          sds:mapSDS(g(['sds:ir35report'])),
          hmrc:mapHMRC(g(['hmrccesttool(datecreated)'])),
          bank:docVal(g(['proofofbankdetails'])),
          vat:docVal(g(['vatcertificate/number'])),
          coi:docVal(g(['certificateofincorporation'])),
          eli:mapWarn(g(['employersliabilityinsurancewarning'])),
          pii:mapWarn(g(['professionalindemnityinsurancewarning'])),
          pli:mapWarn(g(['publicliabilityinsurancewarning'])),
          rtw:mapRTW(g(['righttoworkstatus'])),
          ok:g(['compliant/noncompliant']),
          notes:[g(["joy'snotes:"]),g(['baileynotes']),g(['baileyaction']),g(['charlienotesfrommyreports'])].filter(Boolean).join(' | ')
        };
        if(!c.name||c.name==='CONTRACTOR NAME')return null;
        c.issues=computeIssues(c);
        const hasRed=(c.ok||'').toLowerCase().includes('non')||c.issues.some(i=>i.sev==='red');
        c.sev=hasRed?'red':(c.issues.some(i=>i.sev==='amber')?'amber':'green');
        c.issue_count=c.issues.length;
        return c;
      }).filter(Boolean);
      setSt(85,'Computing stats…');
      if(parsed.length>0){
        LIVE=parsed;STATS=computeStats(parsed);
        const ds=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        UH=[{id:Date.now(),name:file.name,date:ds,count:LIVE.length,compliant:STATS.compliant,nc:STATS.nc,data:LIVE},...UH];
        document.getElementById('parsedDate').textContent=ds;
      }
      setSt(100,`✓ ${parsed.length} contractors loaded`);
      setTimeout(()=>{closeUpload();rt();showToast(`✓ ${file.name} — ${parsed.length} contractors`);},800);
    }catch(err){console.error(err);setSt(0,'✗ Error: '+err.message,true);}
  };
  reader.readAsArrayBuffer(file);
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function ih(v){
  const sl=(v||'').toLowerCase();
  if(sl==='valid'||sl==='yes')return`<span class="iv">✓ ${v}</span>`;
  if(sl.includes('expired'))return`<span class="ie">✗ Expired</span>`;
  if(sl.includes('30')||sl.includes('60'))return`<span class="iw">⚠ ${v}</span>`;
  if(sl==='missing')return`<span class="ie">✗ Missing</span>`;
  if(sl==='n/a'||sl.includes('margin'))return`<span class="im">N/A</span>`;
  return`<span class="im">${v||'—'}</span>`;
}
function bh(s){
  const sl=(s||'').toLowerCase();
  if(sl==='compliant')return'<span class="badge b-green">✓ Compliant</span>';
  if(sl.includes('non'))return'<span class="badge b-red">✗ Non-Compliant</span>';
  return`<span class="badge b-gray">${s||'—'}</span>`;
}
function ct(r){
  const cd=(r.cd||'').toLowerCase(),u=(r.umb||'').toLowerCase(),l=(r.ltd||'').toLowerCase();
  if(cd.includes('margin'))return'Margin Only';
  if(u.includes('deel')||cd.includes('deel'))return'Deel';
  if(u.includes('workwell')||cd.includes('workwell'))return'Workwell';
  if(u&&u!=='no'&&u.length>3)return'Umbrella';
  if(l&&l!=='no'&&l.length>3)return'LTD';
  return'Other';
}
function chipHtml(i){
  const cls=i.status==='60 Days'?'chip-amber':i.status==='Missing'?'chip-missing':'chip-red';
  const icon=i.status==='60 Days'?'⏰':i.status==='Missing'?'◌':'✗';
  return`<span class="chip ${cls}">${icon} ${i.label}${i.status!=='Missing'?' '+i.status:''}</span>`;
}
function actionText(i){
  const ins=['ELI','PII','PLI'];
  if(ins.includes(i.label)){
    if(i.status==='Expired')return`Renew ${i.label} — upload to BH`;
    if(i.status==='<30 Days'||i.status==='60 Days')return`${i.label} expiring — chase renewal`;
    return`Obtain & upload ${i.label} to BH`;
  }
  if(i.label==='RTW'){
    if(i.status==='Expired')return'Right to Work expired — urgent action required';
    if(i.status==='Missing')return'Obtain Right to Work evidence';
    return'Right to Work expiring — verify and renew';
  }
  return({'Signed Contractor Contract':'Chase contractor for signed contract','Signed Client Contract':'Chase client for signed contract','SDS IR35 Report':'Request SDS IR35 report from client','HMRC CEST Tool':'Complete/obtain HMRC CEST tool record','Proof of Bank Details':'Request bank details from contractor','VAT Certificate':'Request VAT certificate/number','Certificate of Incorporation':'Request Certificate of Incorporation'}[i.label])||`Action required: ${i.label}`;
}
const CMAP={'Valid':'#22c55e','60 Days':'#f59e0b','<30 Days':'#fbbf24','Expired':'#ef4444','Missing':'#6b7280','N/A':'#4b5563','Yes':'#22c55e','No':'#ef4444','Inside':'#ff3da6','Outside':'#f5c518','Margin Only':'#6b7280','Umbrella':'#3b82f6','Deel':'#8b5cf6','Workwell':'#06b6d4'};
function sRow(rows){return rows.map(r=>{const c=CMAP[r.l]||'#6b7280';return`<div class="stat-row"><div class="stat-dot" style="background:${c}"></div><span class="stat-label">${r.l}</span><span class="stat-n">${r.n}</span><span class="stat-p">${r.p}%</span><div class="stat-bar"><div class="bar-track"><div class="bar-fill" style="width:${Math.min(r.p,100)}%;background:${c}"></div></div></div></div>`;}).join('');}
function mk(data,f,ls){const t=data.length,p=n=>t>0?Math.round(n/t*100):0,cnt=v=>data.filter(r=>(r[f]||'').trim()===v).length;return ls.map(l=>({l,n:cnt(l),p:p(cnt(l))}));}
function mkIns(data,f){const t=data.length,p=n=>t>0?Math.round(n/t*100):0;return[{l:'Valid',n:data.filter(r=>r[f]==='Valid').length,p:p(data.filter(r=>r[f]==='Valid').length)},{l:'60 Days',n:data.filter(r=>r[f]==='60 Days').length,p:p(data.filter(r=>r[f]==='60 Days').length)},{l:'<30 Days',n:data.filter(r=>r[f]==='<30 Days').length,p:p(data.filter(r=>r[f]==='<30 Days').length)},{l:'Expired',n:data.filter(r=>r[f]==='Expired').length,p:p(data.filter(r=>r[f]==='Expired').length)},{l:'Missing',n:data.filter(r=>r[f]==='Missing').length,p:p(data.filter(r=>r[f]==='Missing').length)},{l:'N/A',n:data.filter(r=>r[f]==='N/A').length,p:p(data.filter(r=>r[f]==='N/A').length)}];}
function sh(label,color){return`<div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">${label}</div>`;}

function getNF(){
  return LIVE.filter(r=>{

    if(!ms||NC!=='all'&&r.con!==NC)return false;
    if(NF==='nc')return(r.ok||'').toLowerCase().includes('non');
    if(NF==='expired')return r.issues.some(i=>i.status==='Expired');
    if(NF==='missing')return r.issues.some(i=>i.status==='Missing');
    if(NF==='exp30')return r.issues.some(i=>i.status==='<30 Days');
    if(NF==='exp60')return r.issues.some(i=>i.status==='60 Days');

    if(NF==='ins')return['eli','pii','pli'].some(f=>['Expired','<30 Days','60 Days','Missing'].includes(r[f]));

    <th style="width:48%">Issues</th>
    <th style="width:6%;text-align:center">#</th>
    <th style="width:5%"></th>
  </tr></thead><tbody>${rows||`<tr><td colspan="5" class="empty">No contractors match — 🎉 all clear!</td></tr>`}</tbody></table></div>
  <div style="display:flex;gap:18px;margin-top:12px;font-size:11px;color:var(--text3)">
    <span>🔴 Expired / missing / non-compliant</span><span>🟡 Expiring soon</span><span>🟢 Compliant with minor notes</span>
  </div>`;}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function rh(){return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <p style="font-size:13px;color:var(--text2)">Each upload saved for this session. Click to switch datasets.</p>
    <button class="upload-btn" onclick="openUpload()" style="font-size:12px;padding:7px 16px">↑ Upload File</button></div>
  <div class="card" style="padding:0">
    ${UH.map((u,i)=>`<div class="hi${i===0?' act':''}" onclick="suH(${u.id})">
      <div class="hico">📊</div>
      <div class="hin"><div class="hnm">${u.name}</div><div class="hmt">Loaded ${u.date} · ${u.count} contractors</div></div>
      <div class="hbd"><span class="badge b-green">${u.compliant} compliant</span>${u.nc>0?`<span class="badge b-red">${u.nc} non-compliant</span>`:''} ${i===0?'<span class="badge b-pink">Active</span>':''}</div>
    </div>`).join('')}
  </div>
  <div class="ib">ℹ Upload history stored for this browser session only.</div>`;}

// ── ROUTING ───────────────────────────────────────────────────────────────────
function sw(name,btn){AT=name;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');rt();}
function rt(){
  ['o','c','n','h'].forEach(t=>{document.getElementById('t'+t).style.display=AT===t?'block':'none';});
  if(AT==='o')document.getElementById('to').innerHTML=ro();
  if(AT==='c')document.getElementById('tc').innerHTML=rc2();
  if(AT==='n')document.getElementById('tn').innerHTML=rn();
  if(AT==='h')document.getElementById('th').innerHTML=rh();
}
function tr2(id){EX=EX===id?null:id;document.getElementById('tc').innerHTML=rc2();}
function os(v){SQ=v.toLowerCase();EX=null;document.getElementById('tc').innerHTML=rc2();}
function of(v){FS=v;EX=null;document.getElementById('tc').innerHTML=rc2();}
function ofc(v){FC=v;EX=null;document.getElementById('tc').innerHTML=rc2();}
function ntr(id){NEX=NEX===id?null:id;document.getElementById('tn').innerHTML=rn();}
function nqs(v){NQ=v.toLowerCase();NEX=null;document.getElementById('tn').innerHTML=rn();}
function ncc(v){NC=v;NEX=null;document.getElementById('tn').innerHTML=rn();}
function setNF(v){NF=v;NEX=null;document.getElementById('tn').innerHTML=rn();}
function suH(id){const e=UH.find(u=>u.id===id);if(e&&e.data){LIVE=e.data;STATS=computeStats(LIVE);}document.getElementById('th').innerHTML=rh();showToast('Switched to: '+e.name);}
function openUpload(){document.getElementById('uploadOverlay').classList.add('show');}
function closeUpload(){document.getElementById('uploadOverlay').classList.remove('show');resetSt();}
function closeUploadOutside(e){if(e.target.id==='uploadOverlay')closeUpload();}
function setSt(pct,msg,isErr=false){document.getElementById('progBar').style.display='block';document.getElementById('progFill').style.width=pct+'%';const st=document.getElementById('parseSt');st.style.display='block';st.style.color=isErr?'var(--red)':'var(--pink)';st.textContent=msg;}
function resetSt(){document.getElementById('progBar').style.display='none';document.getElementById('progFill').style.width='0%';const st=document.getElementById('parseSt');st.style.display='none';st.textContent='';}
function onDrag(e){e.preventDefault();document.getElementById('dropZone').classList.add('drag');}
function offDrag(){document.getElementById('dropZone').classList.remove('drag');}
function onDrop(e){e.preventDefault();offDrag();const f=e.dataTransfer.files[0];if(f)parseFile(f);}
function showToast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'');setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3500);}
</script>
</body>
</html>
